<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Flow Health Check — TMS Solutions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #141414;
      --bg-input: #1c1c1c;
      --gold: #FFD700;
      --gold-muted: #b8960c;
      --gold-dim: rgba(255,215,0,0.10);
      --gold-border: rgba(255,215,0,0.30);
      --white: #ffffff;
      --gray: #888888;
      --gray-light: #cccccc;
      --border: #262626;
      --radius: 14px;
      --radius-sm: 8px;
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.10);
      --green-border: rgba(34,197,94,0.30);
      --yellow: #eab308;
      --yellow-dim: rgba(234,179,8,0.10);
      --yellow-border: rgba(234,179,8,0.30);
      --red: #ef4444;
      --red-dim: rgba(239,68,68,0.10);
      --red-border: rgba(239,68,68,0.30);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app { min-height: 100vh; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ==================== LANDING ==================== */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #1c1400 0%, var(--bg) 65%);
    }

    .tms-logo { margin-bottom: 48px; }
    .tms-letters {
      display: block;
      font-size: 44px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 10px;
      line-height: 1;
      text-shadow: 0 0 40px rgba(255,215,0,0.3);
    }
    .tms-sub {
      display: block;
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gray-light);
      margin-top: 6px;
      opacity: 0.8;
    }

    .landing-eyebrow {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      font-weight: 600;
    }

    .landing-title {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }
    .landing-title .gold { color: var(--gold); display: block; }

    .landing-sub {
      font-size: 17px;
      color: var(--gray-light);
      max-width: 500px;
      line-height: 1.65;
      margin-bottom: 14px;
    }

    .landing-meta-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 20px;
      margin-bottom: 40px;
      font-size: 13px;
      color: var(--gray);
    }
    .landing-meta-row span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .landing-meta-row span::before {
      content: '✓';
      color: var(--gold);
      font-weight: 700;
    }

    .landing-biz-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 28px;
      width: 100%;
      max-width: 360px;
    }
    .landing-biz-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      align-self: flex-start;
    }
    .landing-biz-input {
      width: 100%;
      background: #141414;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--white);
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .landing-biz-input::placeholder { color: #3a3a3a; }
    .landing-biz-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
    }

    .btn-primary {
      background: var(--gold);
      color: #000;
      border: none;
      padding: 18px 52px;
      font-size: 17px;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 32px rgba(255,215,0,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 44px rgba(255,215,0,0.55);
      background: #ffe44d;
    }

    /* ==================== PROGRESS BAR ==================== */
    .progress-wrap {
      background: #0f0f0f;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 760px;
      margin: 0 auto 10px;
      font-size: 12px;
      color: var(--gray);
    }
    .progress-head strong { color: var(--gold); font-size: 13px; }
    .progress-steps {
      display: flex;
      gap: 4px;
      max-width: 760px;
      margin: 0 auto;
    }
    .ps {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.3s ease;
    }
    .ps.done { background: var(--gold-muted); }
    .ps.active { background: var(--gold); }

    /* ==================== SECTION PAGE ==================== */
    .section-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .section-body {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 44px 24px 60px;
      animation: fadeUp 0.3s ease both;
    }

    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .section-title {
      font-size: clamp(26px, 4.5vw, 40px);
      font-weight: 900;
      letter-spacing: -0.8px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 15px;
      color: var(--gray-light);
      line-height: 1.65;
      margin-bottom: 36px;
      max-width: 560px;
    }

    .questions { display: flex; flex-direction: column; gap: 28px; margin-bottom: 40px; }

    .question { display: flex; flex-direction: column; gap: 10px; }

    .q-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.5;
    }
    .q-num {
      font-size: 11px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    /* YES/NO toggle buttons */
    .yn-group {
      display: flex;
      gap: 10px;
    }
    .yn-btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--gray-light);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.5px;
    }
    .yn-btn:hover { border-color: var(--gold); color: var(--gold); }
    .yn-btn.selected-yes {
      background: var(--green-dim);
      border-color: var(--green-border);
      color: var(--green);
    }
    .yn-btn.selected-no {
      background: var(--red-dim);
      border-color: var(--red-border);
      color: var(--red);
    }

    /* Select dropdown */
    .q-select-wrap {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .q-select-wrap:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
    }
    .q-select {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-size: 15px;
      font-weight: 500;
      padding: 14px 16px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .q-select option { background: #1c1c1c; color: var(--white); }
    .q-select-wrap {
      position: relative;
    }
    .q-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      pointer-events: none;
      font-size: 14px;
    }

    /* Textarea */
    .q-textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--white);
      font-size: 15px;
      font-family: inherit;
      padding: 14px 16px;
      outline: none;
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .q-textarea::placeholder { color: #3a3a3a; }
    .q-textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255,215,0,0.1);
    }

    /* Nav */
    .section-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-back {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gray-light);
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-back:hover { border-color: var(--gold); color: var(--gold); }

    .btn-next {
      background: var(--gold);
      border: none;
      color: #000;
      padding: 14px 38px;
      font-size: 15px;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 20px rgba(255,215,0,0.2);
      letter-spacing: 0.2px;
    }
    .btn-next:hover {
      background: #ffe44d;
      box-shadow: 0 4px 32px rgba(255,215,0,0.45);
      transform: translateY(-1px);
    }

    /* ==================== RESULTS ==================== */
    .results-page {
      min-height: 100vh;
      background: var(--bg);
      padding: 48px 24px 80px;
      animation: fadeUp 0.4s ease both;
    }

    .results-container { max-width: 820px; margin: 0 auto; }

    .results-header {
      text-align: center;
      margin-bottom: 44px;
      padding-bottom: 36px;
      border-bottom: 1px solid var(--border);
    }
    .res-tms {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 8px;
      margin-bottom: 6px;
    }
    .res-sub {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 24px;
    }
    .res-title {
      font-size: clamp(24px, 5vw, 38px);
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .res-biz {
      font-size: 16px;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .res-date { font-size: 13px; color: var(--gray); }

    /* Overall Score */
    .overall-score-wrap {
      text-align: center;
      margin-bottom: 44px;
    }
    .overall-score-card {
      display: inline-block;
      padding: 36px 48px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .overall-score-card.green {
      background: var(--green-dim);
      border: 2px solid var(--green-border);
    }
    .overall-score-card.yellow {
      background: var(--yellow-dim);
      border: 2px solid var(--yellow-border);
    }
    .overall-score-card.red {
      background: var(--red-dim);
      border: 2px solid var(--red-border);
    }

    .score-pct {
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }
    .score-pct.green { color: var(--green); }
    .score-pct.yellow { color: var(--yellow); }
    .score-pct.red { color: var(--red); }

    .score-label {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .score-label.green { color: var(--green); }
    .score-label.yellow { color: var(--yellow); }
    .score-label.red { color: var(--red); }

    .score-verdict {
      font-size: 17px;
      color: var(--gray-light);
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* Section cards */
    .sections-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 44px;
    }

    .sec-card {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      overflow: hidden;
    }

    .sec-card-hdr {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .sec-icon { font-size: 24px; }

    .sec-info { flex: 1; }
    .sec-num {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 2px;
    }
    .sec-name { font-size: 17px; font-weight: 800; }

    .sec-score-wrap { text-align: right; }
    .sec-score-pct {
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
    }
    .sec-score-badge {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 2px;
    }

    .green-text { color: var(--green); }
    .yellow-text { color: var(--yellow); }
    .red-text { color: var(--red); }

    .sec-card-body { padding: 20px 24px; }

    .sec-q-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 16px;
    }
    .sec-q-row:last-child { border-bottom: none; }
    .sec-q-text { font-size: 13px; color: var(--gray-light); line-height: 1.45; flex: 1; }
    .sec-q-ans {
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .ans-yes { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .ans-no  { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-border); }
    .ans-mid { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow-border); }
    .ans-text { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-border); max-width: 200px; white-space: normal; text-align: right; }

    /* Recommendations */
    .recs-section {
      margin-bottom: 44px;
    }
    .recs-title {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 20px;
      color: var(--white);
    }
    .recs-title span { color: var(--gold); }

    .rec-card {
      border-radius: var(--radius-sm);
      padding: 20px 24px;
      margin-bottom: 12px;
      border-left: 3px solid;
    }
    .rec-card.green { background: var(--green-dim); border-color: var(--green); }
    .rec-card.yellow { background: var(--yellow-dim); border-color: var(--yellow); }
    .rec-card.red { background: var(--red-dim); border-color: var(--red); }

    .rec-section-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.7;
    }
    .rec-text {
      font-size: 14px;
      color: var(--white);
      line-height: 1.65;
    }

    /* Action buttons */
    .results-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn-download {
      background: var(--gold);
      border: none;
      color: #000;
      padding: 16px 40px;
      font-size: 15px;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 20px rgba(255,215,0,0.25);
    }
    .btn-download:hover {
      background: #ffe44d;
      box-shadow: 0 4px 32px rgba(255,215,0,0.5);
      transform: translateY(-1px);
    }

    .btn-restart {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gray-light);
      padding: 16px 36px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-restart:hover { border-color: var(--gold); color: var(--gold); }

    /* Contact CTA */
    .contact-cta {
      text-align: center;
      padding: 36px 24px;
      background: linear-gradient(135deg, #171200 0%, #141414 100%);
      border: 1px solid var(--gold-border);
      border-radius: var(--radius);
      margin-bottom: 44px;
    }
    .contact-cta h3 {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 10px;
      color: var(--gold);
    }
    .contact-cta p {
      font-size: 15px;
      color: var(--gray-light);
      line-height: 1.65;
      max-width: 480px;
      margin: 0 auto 20px;
    }
    .contact-cta a {
      color: var(--gold);
      font-weight: 700;
      text-decoration: none;
    }
    .contact-cta a:hover { text-decoration: underline; }

    /* Concern display */
    .concern-box {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      font-size: 14px;
      color: var(--gray-light);
      line-height: 1.6;
      font-style: italic;
      margin-top: 8px;
    }

    @media (max-width: 600px) {
      .yn-group { flex-direction: column; }
      .overall-score-card { padding: 28px 32px; }
      .score-pct { font-size: 56px; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// =====================================================================
// DATA: 21 Questions across 6 Sections
// =====================================================================
const SECTIONS = [
  {
    id: 1,
    icon: '💵',
    title: 'Right Now',
    desc: 'Let\'s start with a snapshot of your current cash position. These numbers tell us how much cushion you\'re working with today.',
    questions: [
      {
        id: 'q1',
        text: 'Do you know exactly how much cash your business has on hand right now?',
        type: 'yn',
        scoring: { yes: 1, no: 0 }
      },
      {
        id: 'q2',
        text: 'How many months of operating expenses could you cover with your current cash?',
        type: 'select',
        options: [
          { label: 'Less than 1 month', value: 'lt1', score: 0 },
          { label: '1–3 months', value: '1to3', score: 0.5 },
          { label: '3–6 months', value: '3to6', score: 0.75 },
          { label: '6+ months', value: 'gt6', score: 1 }
        ]
      },
      {
        id: 'q3',
        text: 'Do you have a line of credit available that you could draw from if needed?',
        type: 'yn',
        scoring: { yes: 1, no: 0 }
      },
      {
        id: 'q4',
        text: 'Are you currently on time with all bills and vendor payments?',
        type: 'yn',
        scoring: { yes: 1, no: 0 }
      }
    ]
  },
  {
    id: 2,
    icon: '📈',
    title: 'Money Coming In',
    desc: 'Reliable revenue is the foundation of healthy cash flow. We\'re looking at how predictable, fast, and systematic your income really is.',
    questions: [
      {
        id: 'q5',
        text: 'Is your monthly revenue consistent and relatively predictable?',
        type: 'yn',
        scoring: { yes: 1, no: 0 }
      },
      {
        id: 'q6',
        text: 'Do repeat or returning customers make up the majority of your revenue?',
        type: 'yn',
        scoring: { yes: 1, no: 0 }
      },
      {
        id: 'q7',
        text: 'On average, how long does it take customers to pay you after invoicing?',
        type: 'select',
        options: [
          { label: 'Same day or Net-15', value: 'fast', score: 1 },
          { label: 'Net-30', value: 'net30', score: 0.75 },
          { label: 'Net-60', value: 'net60', score: 0.25 },
          { label: 'More than 60 days or unknown', value: 'slow', score: 0 }
        ]
      },
      {
        id: 'q8',
        text: 'Do you have a system for following up on unpaid or overdue invoices?',
        type: 'yn',
        scoring: { yes: 1, no: 0 }
      }
    ]
  },
  {
    id: 3,
    icon: '📊',
    title: 'Money Going Out',
    desc: 'Cash leaks quietly. We\'re checking whether you have visibility and control over what leaves your business every month.',
    questions: [
      {
        id: 'q9',
        text: 'Do you know your exact fixed monthly expenses (rent, payroll, insurance, etc.)?',
        type: 'yn',
        scoring: { yes: 1, no: 0 }
      },
      {
        id: 'q10',
        text: 'Have you reviewed all your subscriptions and recurring charges in the last 6 months?',
        type: 'yn',
        scoring: { yes: 1, no: 0 }
      },
      {
        id: 'q11',
        text: 'Do you keep your business and personal finances completely separate?',
        type: 'yn',
        scoring: { yes: 1, no: 0 }

let state = {
  view: 'landing',       // 'landing' | 'quiz' | 'results'
  businessName: '',
  currentSection: 0,     // 0-based index into SECTIONS
  answers: {}            // { q1: 'yes'|'no'|value, ... }

// =====================================================================
// SCORING
// =====================================================================
function scoreSection(sectionIdx) {
  const sec = SECTIONS[sectionIdx];
  let earned = 0;
  let maxPossible = 0;

  sec.questions.forEach(q => {
    if (!q.scoring && q.type !== 'select') return; // textarea skipped
    if (q.type === 'yn') {
      maxPossible += 1;
      const ans = state.answers[q.id];
      if (ans === 'yes') earned += q.scoring.yes;
      else if (ans === 'no') earned += q.scoring.no;
    } else if (q.type === 'select') {
      maxPossible += 1;
      const ans = state.answers[q.id];
      const opt = q.options.find(o => o.value === ans);
      if (opt) earned += opt.score;
    }
  });

  if (maxPossible === 0) return { pct: 100, color: 'green', earned: 0, max: 0 };
  const pct = Math.round((earned / maxPossible) * 100);
  const color = pct >= 75 ? 'green' : pct >= 50 ? 'yellow' : 'red';
  return { pct, color, earned, max: maxPossible };
}

function scoreAll() {
  let totalEarned = 0;
  let totalMax = 0;
  const sections = SECTIONS.map((_, i) => {
    const s = scoreSection(i);
    totalEarned += s.earned;
    totalMax += s.max;
    return s;
  });
  const pct = totalMax > 0 ? Math.round((totalEarned / totalMax) * 100) : 0;
  const color = pct >= 75 ? 'green' : pct >= 50 ? 'yellow' : 'red';
  return { pct, color, sections };
}

function verdictText(color, pct) {
  if (color === 'green') return `Your cash flow health is strong at ${pct}%. You have solid fundamentals in place. The recommendations below will help you lock in your gains and identify any remaining gaps.`;
  if (color === 'yellow') return `Your cash flow health is moderate at ${pct}%. You have some good habits in place, but there are clear gaps creating risk and leaving revenue on the table. The recommendations below show you exactly where to focus.`;
  return `Your cash flow health needs immediate attention at ${pct}%. Several key systems are missing or underperforming. The good news: the fixes are known, and many can be implemented quickly without major cost.`;
}

function renderQuestion(q, absNum) {
  const ans = state.answers[q.id];

  if (q.type === 'yn') {

    return `

        <div class="q-num">Q${absNum}</div>
        <div class="q-text">${escHtml(q.text)}</div>

          <button class="${noCls}"  data-qid="${q.id}" data-val="no">No</button>
        </div>
      </div>
    `;
  }

  if (q.type === 'select') {
    const optHtml = q.options.map(o =>
      `<option value="${o.value}" ${ans === o.value ? 'selected' : ''}>${escHtml(o.label)}</option>`
    ).join('');
    return `
      <div class="question" data-qid="${q.id}">
        <div class="q-num">Q${absNum}</div>
        <div class="q-text">${escHtml(q.text)}</div>
        <div class="q-select-wrap">

            <option value="" disabled ${!ans ? 'selected' : ''}>Select an answer…</option>
            ${optHtml}
          </select>
        </div>
      </div>
    `;
  }

  if (q.type === 'textarea') {
    return `
      <div class="question" data-qid="${q.id}">
        <div class="q-num">Q${absNum}</div>
        <div class="q-text">${escHtml(q.text)}</div>

          placeholder="${escHtml(q.placeholder || '')}"
          rows="4"
        >${escHtml(ans || '')}</textarea>
      </div>
    `;
  }

  return '';
}

// =====================================================================

function attachListeners() {
  // Landing
  const startBtn = document.getElementById('start-btn');
  if (startBtn) {
    startBtn.addEventListener('click', () => {
      const input = document.getElementById('biz-name-input');
      state.businessName = input ? input.value.trim() : '';
      state.view = 'quiz';
      state.currentSection = 0;
      render();
      window.scrollTo(0, 0);
    });
  }

  // Business name on Enter
  const bizInput = document.getElementById('biz-name-input');
  if (bizInput) {
    bizInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('start-btn')?.click();
    });
  }

  // YES/NO buttons
  document.querySelectorAll('.yn-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const qid = btn.dataset.qid;
      const val = btn.dataset.val;
      state.answers[qid] = val;
      // Update classes without full re-render
      const group = btn.closest('.yn-group');
      group.querySelectorAll('.yn-btn').forEach(b => {
        b.classList.remove('selected-yes', 'selected-no');
      });
      btn.classList.add(val === 'yes' ? 'selected-yes' : 'selected-no');
    });
  });

  // Select dropdowns
  document.querySelectorAll('.q-select').forEach(sel => {
    sel.addEventListener('change', () => {
      state.answers[sel.dataset.qid] = sel.value;
    });
  });

  // Textareas
  document.querySelectorAll('.q-textarea').forEach(ta => {
    ta.addEventListener('input', () => {
      state.answers[ta.dataset.qid] = ta.value;
    });
  });

  // Back button
  const backBtn = document.getElementById('back-btn');
  if (backBtn) {
    backBtn.addEventListener('click', () => {
      if (state.currentSection > 0) {
        state.currentSection--;
        render();
        window.scrollTo(0, 0);
      }
    });
  }

  // Next button
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      if (state.currentSection < SECTIONS.length - 1) {
        state.currentSection++;
        render();
        window.scrollTo(0, 0);
      } else {
        state.view = 'results';
        render();
        window.scrollTo(0, 0);
      }
    });
  }

  // PDF download
  const pdfBtn = document.getElementById('pdf-btn');
  if (pdfBtn) {
    pdfBtn.addEventListener('click', generatePDF);
  }

  // Restart
  const restartBtn = document.getElementById('restart-btn');
  if (restartBtn) {
    restartBtn.addEventListener('click', () => {
      state = { view: 'landing', businessName: state.businessName, currentSection: 0, answers: {} };
      render();
      window.scrollTo(0, 0);
    });
  }
}

function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const W = 612, H = 792;
  const GOLD = [255, 215, 0];
  const BLACK = [10, 10, 10];
  const WHITE = [255, 255, 255];
  const GRAY = [136, 136, 136];
  const GRAY_LIGHT = [204, 204, 204];
  const GREEN_C = [34, 197, 94];
  const YELLOW_C = [234, 179, 8];
  const RED_C = [239, 68, 68];

  const { pct, color, sections } = scoreAll();
  const bizName = state.businessName || 'Your Business';
  const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  function colorForStatus(c) {
    if (c === 'green') return GREEN_C;
    if (c === 'yellow') return YELLOW_C;
    return RED_C;
  }

  function labelForStatus(c) {
    if (c === 'green') return 'GREEN — Healthy';
    if (c === 'yellow') return 'YELLOW — Needs Attention';
    return 'RED — At Risk';
  }

  function newPage() {
    doc.addPage();
    // subtle dark bg suggestion via rect
    doc.setFillColor(...BLACK);
    doc.rect(0, 0, W, H, 'F');
  }

  function setColor(rgb) { doc.setTextColor(...rgb); }
  function setFill(rgb)  { doc.setFillColor(...rgb); }
  function setDraw(rgb)  { doc.setDrawColor(...rgb); }

  function goldLine(x1, y1, x2) {
    setDraw(GOLD);
    doc.setLineWidth(1.5);
    doc.line(x1, y1, x2, y1);
  }

  function footer(pageNum, total) {
    setColor(GRAY);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.text('TMS SOLUTIONS GROUP  |  CASH FLOW HEALTH CHECK  |  CONFIDENTIAL', W / 2, H - 28, { align: 'center' });
    doc.text(`Page ${pageNum} of ${total}`, W - 56, H - 28, { align: 'right' });
  }

  const TOTAL_PAGES = 7;

  // ===== PAGE 1: COVER =====
  doc.setFillColor(...BLACK);
  doc.rect(0, 0, W, H, 'F');

  // Gold accent bar top
  setFill(GOLD);
  doc.rect(0, 0, W, 6, 'F');

  // TMS logo area
  setColor(GOLD);
  doc.setFontSize(52);
  doc.setFont('helvetica', 'bold');
  doc.text('TMS', W / 2, 160, { align: 'center' });

  setColor(GRAY_LIGHT);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.setCharSpace(5);
  doc.text('SOLUTIONS GROUP', W / 2, 182, { align: 'center' });
  doc.setCharSpace(0);

  goldLine(56, 220, W - 56);

  setColor(WHITE);
  doc.setFontSize(30);
  doc.setFont('helvetica', 'bold');
  doc.text('Cash Flow', W / 2, 276, { align: 'center' });
  doc.text('Health Check', W / 2, 316, { align: 'center' });

  setColor(GOLD);
  doc.setFontSize(13);
  doc.setFont('helvetica', 'normal');
  doc.setCharSpace(2);
  doc.text('BUSINESS FINANCIAL ASSESSMENT', W / 2, 348, { align: 'center' });
  doc.setCharSpace(0);

  goldLine(56, 372, W - 56);

  if (bizName !== 'Your Business') {
    setColor(GOLD);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text(bizName, W / 2, 416, { align: 'center' });
  }

  setColor(GRAY);
  doc.setFontSize(12);
  doc.setFont('helvetica', 'normal');
  doc.text(today, W / 2, 444, { align: 'center' });

  // Score preview on cover
  const scoreColor = colorForStatus(color);
  setFill([...scoreColor.map(v => Math.round(v * 0.15))]);
  // draw rounded rect manually via rect
  doc.setFillColor(scoreColor[0] * 0.15, scoreColor[1] * 0.15, scoreColor[2] * 0.15);
  doc.rect(W / 2 - 100, 490, 200, 110, 'F');
  setDraw(...scoreColor);
  doc.setLineWidth(1.5);
  doc.rect(W / 2 - 100, 490, 200, 110);

  setColor(scoreColor);
  doc.setFontSize(48);
  doc.setFont('helvetica', 'bold');
  doc.text(`${pct}%`, W / 2, 550, { align: 'center' });

  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(1.5);
  doc.text(labelForStatus(color).toUpperCase(), W / 2, 580, { align: 'center' });
  doc.setCharSpace(0);

  setFill(GOLD);
  doc.rect(0, H - 6, W, 6, 'F');

  footer(1, TOTAL_PAGES);

  // ===== PAGE 2: EXECUTIVE SUMMARY =====
  newPage();
  setFill(GOLD);
  doc.rect(0, 0, W, 6, 'F');

  setColor(GOLD);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(3);
  doc.text('EXECUTIVE SUMMARY', 56, 48, { align: 'left' });
  doc.setCharSpace(0);
  goldLine(56, 58, W - 56);

  setColor(WHITE);
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  doc.text('Overall Cash Flow Health', 56, 92);

  // Overall score box
  const sc = colorForStatus(color);
  doc.setFillColor(sc[0] * 0.12, sc[1] * 0.12, sc[2] * 0.12);
  doc.rect(56, 106, 500, 90, 'F');
  setDraw(...sc);
  doc.setLineWidth(1);
  doc.rect(56, 106, 500, 90);

  setColor(sc);
  doc.setFontSize(44);
  doc.setFont('helvetica', 'bold');
  doc.text(`${pct}%`, 120, 162);

  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text(labelForStatus(color), 210, 148);

  setColor(GRAY_LIGHT);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  const verdictLines = doc.splitTextToSize(verdictText(color, pct), 300);
  doc.text(verdictLines, 210, 166);

  // Section summary table
  setColor(WHITE);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('Section-by-Section Scores', 56, 232);

  let ty = 252;
  SECTIONS.forEach((sec, i) => {
    const s = sections[i];
    const sc2 = colorForStatus(s.color);
    // row background
    doc.setFillColor(20, 20, 20);
    doc.rect(56, ty - 14, 500, 26, 'F');
    // color bar
    doc.setFillColor(...sc2);
    doc.rect(56, ty - 14, 4, 26, 'F');

    setColor(GRAY_LIGHT);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text(`${sec.icon}  ${sec.title}`, 72, ty + 4);

    // Progress bar
    const barX = 280, barW = 180, barH = 8;
    doc.setFillColor(40, 40, 40);
    doc.rect(barX, ty - 3, barW, barH, 'F');
    doc.setFillColor(...sc2);
    doc.rect(barX, ty - 3, barW * (s.pct / 100), barH, 'F');

    setColor(sc2);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text(`${s.pct}%`, 476, ty + 4);

    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setCharSpace(1);
    doc.text(s.color.toUpperCase(), 510, ty + 4);
    doc.setCharSpace(0);

    ty += 30;
  });

  // Concern
  const concern = state.answers['q20'];
  if (concern) {
    ty += 10;
    setColor(GOLD);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('Stated Concern:', 56, ty);
    ty += 16;
    doc.setFillColor(28, 28, 28);
    doc.rect(56, ty - 12, 500, 40, 'F');
    setColor(GRAY_LIGHT);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'italic');
    const cLines = doc.splitTextToSize(`"${concern}"`, 480);
    doc.text(cLines.slice(0, 3), 68, ty + 2);
  }

  setFill(GOLD);
  doc.rect(0, H - 6, W, 6, 'F');
  footer(2, TOTAL_PAGES);

  // ===== PAGES 3-6: SECTIONS 1-4 =====
  for (let i = 0; i < 4; i++) {
    newPage();
    setFill(GOLD);
    doc.rect(0, 0, W, 6, 'F');
    renderSectionPage(doc, SECTIONS[i], sections[i], i + 3, TOTAL_PAGES,
      { W, H, GOLD, BLACK, WHITE, GRAY, GRAY_LIGHT, colorForStatus, labelForStatus, footer, goldLine, setColor, setFill, setDraw });
  }

  // ===== PAGE 7: SECTIONS 5 & 6 + RECOMMENDATIONS + DISCLAIMER =====
  newPage();
  setFill(GOLD);
  doc.rect(0, 0, W, 6, 'F');

  let py = 48;

  // Sections 5 & 6 compact
  for (let i = 4; i < 6; i++) {
    const sec = SECTIONS[i];
    const s = sections[i];
    const sc3 = colorForStatus(s.color);

    setColor(GOLD);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setCharSpace(2);
    doc.text(`SECTION ${sec.id} — ${sec.title.toUpperCase()}`, 56, py);
    doc.setCharSpace(0);
    goldLine(56, py + 6, W - 56);
    py += 22;

    setColor(sc3);
    doc.setFontSize(20);
    doc.setFont('helvetica', 'bold');
    doc.text(`${s.pct}%  ${labelForStatus(s.color)}`, 56, py);
    py += 16;

    sec.questions.forEach(q => {
      const ans = state.answers[q.id];
      if (q.type === 'textarea') return;
      let ansText = '–';
      let ansColor = GRAY;
      if (q.type === 'yn') {
        ansText = ans === 'yes' ? 'YES' : ans === 'no' ? 'NO' : '–';
        ansColor = ans === 'yes' ? GREEN_C : ans === 'no' ? RED_C : GRAY;
      } else if (q.type === 'select') {
        const opt = q.options.find(o => o.value === ans);
        ansText = opt ? opt.label : '–';
        ansColor = opt ? (opt.score >= 0.75 ? GREEN_C : opt.score >= 0.5 ? YELLOW_C : RED_C) : GRAY;
      }
      const qLines = doc.splitTextToSize(q.text, 360);
      setColor(GRAY_LIGHT);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.text(qLines[0], 56, py + 10);
      setColor(ansColor);
      doc.setFont('helvetica', 'bold');
      doc.text(ansText, 440, py + 10, { align: 'right' });
      py += 18;
    });
    py += 10;
  }

  // Recommendations
  goldLine(56, py, W - 56);
  py += 18;
  setColor(GOLD);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('Action Plan & Recommendations', 56, py);
  py += 18;

  SECTIONS.forEach((sec, i) => {
    const s = sections[i];
    const sc4 = colorForStatus(s.color);
    const rec = RECS[sec.id][s.color];

    // color bar
    doc.setFillColor(...sc4);
    doc.rect(56, py, 3, 36, 'F');

    setColor(sc4);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text(`${sec.title}`, 66, py + 12);

    setColor(GRAY_LIGHT);
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    const rLines = doc.splitTextToSize(rec, 460);
    doc.text(rLines.slice(0, 2), 66, py + 24);
    py += 44;

    if (py > H - 120) {
      setFill(GOLD);
      doc.rect(0, H - 6, W, 6, 'F');
      footer(7, TOTAL_PAGES);
      newPage();
      setFill(GOLD);
      doc.rect(0, 0, W, 6, 'F');
      py = 48;
    }
  });

  // Disclaimer
  py += 8;
  goldLine(56, py, W - 56);
  py += 14;
  setColor(GRAY);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'italic');
  const disc = 'DISCLAIMER: This assessment is provided for general informational and educational purposes only. It does not constitute financial, legal, accounting, or professional advice. Results are based solely on your self-reported responses and should not be relied upon as a substitute for consultation with qualified financial, legal, or business professionals. TMS Solutions Group makes no warranties, express or implied, regarding the accuracy, completeness, or suitability of this assessment for any particular purpose. Individual business results will vary. All financial decisions should be made in consultation with appropriate licensed professionals.';
  const dLines = doc.splitTextToSize(disc, 500);
  doc.text(dLines, 56, py);

  setFill(GOLD);
  doc.rect(0, H - 6, W, 6, 'F');
  footer(7, TOTAL_PAGES);

  // Save
  const safeName = (state.businessName || 'TMS').replace(/[^a-zA-Z0-9]/g, '_');
  doc.save(`TMS_CashFlow_HealthCheck_${safeName}.pdf`);
}

// Helper to render a full section page (pages 3-6)
function renderSectionPage(doc, sec, s, pageNum, total, helpers) {
  const { W, H, GOLD, WHITE, GRAY, GRAY_LIGHT, colorForStatus, labelForStatus, footer, goldLine, setColor, setFill, setDraw } = helpers;
  const GREEN_C = [34, 197, 94];
  const YELLOW_C = [234, 179, 8];
  const RED_C = [239, 68, 68];
  const sc = colorForStatus(s.color);

  setColor(GOLD);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(3);
  doc.text(`SECTION ${sec.id}`, 56, 48);
  doc.setCharSpace(0);
  goldLine(56, 58, W - 56);

  setColor(WHITE);
  doc.setFontSize(26);
  doc.setFont('helvetica', 'bold');
  doc.text(sec.title, 56, 92);

  setColor(sc);
  doc.setFontSize(36);
  doc.text(`${s.pct}%`, W - 56, 88, { align: 'right' });
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(1.5);
  doc.text(labelForStatus(s.color), W - 56, 108, { align: 'right' });
  doc.setCharSpace(0);

  setColor(GRAY_LIGHT);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  const descLines = doc.splitTextToSize(sec.desc, 480);
  doc.text(descLines, 56, 126);

  goldLine(56, 150, W - 56);

  let qy = 172;
  sec.questions.forEach((q, qi) => {
    const ans = state.answers[q.id];
    const absNum = SECTIONS.slice(0, sec.id - 1).reduce((a, s2) => a + s2.questions.length, 0) + qi + 1;

    // Q number label
    setColor(GOLD);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text(`Q${absNum}`, 56, qy);

    // Question text
    setColor(WHITE);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    const qLines = doc.splitTextToSize(q.text, 400);
    doc.text(qLines, 76, qy);

    const qH = qLines.length * 14;

    if (q.type === 'yn') {
      const ansText = ans === 'yes' ? 'YES' : ans === 'no' ? 'NO' : 'NOT ANSWERED';
      const ansColor = ans === 'yes' ? GREEN_C : ans === 'no' ? RED_C : GRAY;
      setColor(ansColor);
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text(ansText, W - 56, qy, { align: 'right' });
    } else if (q.type === 'select') {
      const opt = q.options.find(o => o.value === ans);
      const optColor = opt ? (opt.score >= 0.75 ? GREEN_C : opt.score >= 0.5 ? YELLOW_C : RED_C) : GRAY;
      setColor(optColor);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.text(opt ? opt.label : 'Not answered', W - 56, qy, { align: 'right' });
    } else if (q.type === 'textarea') {
      const txt = ans || '(not answered)';
      setColor(GRAY_LIGHT);
      doc.setFontSize(9.5);
      doc.setFont('helvetica', 'italic');
      const tLines = doc.splitTextToSize(`"${txt}"`, 460);
      doc.text(tLines.slice(0, 3), 76, qy + 14);
    }

    // Divider
    doc.setDrawColor(38, 38, 38);
    doc.setLineWidth(0.5);
    doc.line(56, qy + qH + 8, W - 56, qy + qH + 8);

    qy += Math.max(qH + 20, 44);
  });

  // Section recommendation
  const rec = RECS[sec.id][s.color];
  const recY = Math.max(qy + 10, H - 200);
  doc.setFillColor(20, 20, 20);
  doc.rect(56, recY, 500, 110, 'F');
  setDraw(...sc);
  doc.setLineWidth(1.5);
  doc.line(56, recY, 56, recY + 110);
  doc.setLineWidth(0.5);

  setColor(sc);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(1.5);
  doc.text('RECOMMENDATION', 72, recY + 18);
  doc.setCharSpace(0);

  setColor(GRAY_LIGHT);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  const rLines = doc.splitTextToSize(rec, 460);
  doc.text(rLines.slice(0, 5), 72, recY + 34);

  setFill(GOLD);
  doc.rect(0, H - 6, W, 6, 'F');
  footer(pageNum, total);
}

// =====================================================================
// UTILS
// =====================================================================
function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// =====================================================================
// INIT
// =====================================================================
render();
</script>
