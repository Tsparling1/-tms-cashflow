<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Flow Health Check — TMS Solutions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAFAF7;
      --bg-card: #FFFFFF;
      --bg-input: #FFFFFF;
      --gold: #B8860B;
      --gold-muted: #9A7209;
      --gold-dim: rgba(184,134,11,0.08);
      --gold-border: rgba(184,134,11,0.22);
      --white: #1C1C1E;
      --gray: #6B7280;
      --gray-light: #4B5563;
      --border: #E8E5DC;
      --radius: 14px;
      --radius-sm: 8px;
      --green: #15803D;
      --green-dim: rgba(21,128,61,0.08);
      --green-border: rgba(21,128,61,0.28);
      --yellow: #B45309;
      --yellow-dim: rgba(180,83,9,0.08);
      --yellow-border: rgba(180,83,9,0.28);
      --red: #B91C1C;
      --red-dim: rgba(185,28,28,0.07);
      --red-border: rgba(185,28,28,0.28);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app { min-height: 100vh; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ==================== LANDING ==================== */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 80px;
      text-align: center;
      background: #FAFAF7;
      position: relative;
      overflow: hidden;
    }

    /* Subtle warm radial glow behind content */
    .landing::before {
      content: '';
      position: absolute;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(184,134,11,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ---- Landing Header ---- */
    .landing-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    .tms-logo { margin-bottom: 0; }
    
    .tms-logo-img {
      display: block;
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin: 0 auto;
    }
    .tms-letters {
      display: block;
      font-size: 18px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 7px;
      line-height: 1;
    }
    .tms-sub {
      display: block;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gray);
      margin-top: 4px;
    }

    /* ---- Decorative Illustration ---- */
    .landing-illustration {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 36px;
      position: relative;
      z-index: 1;
    }

    /* ---- Landing Content ---- */
    .landing-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .landing-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
      font-weight: 700;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      padding: 5px 14px;
      border-radius: 20px;
    }

    .landing-title {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      font-size: clamp(34px, 6vw, 58px);
      font-weight: 900;
      line-height: 1.06;
      letter-spacing: -1px;
      color: #1C1C1E;
      margin-bottom: 18px;
    }
    .landing-title .gold { color: var(--gold); display: block; }

    .landing-divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(to right, rgba(184,134,11,0.3), var(--gold), rgba(184,134,11,0.3));
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .landing-sub {
      font-size: 16px;
      color: var(--gray-light);
      max-width: 460px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .landing-meta-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 18px;
      margin-bottom: 36px;
      font-size: 13px;
      color: var(--gray);
    }
    .landing-meta-row span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .landing-meta-row span::before {
      content: '✓';
      color: var(--gold);
      font-weight: 700;
    }

    .landing-form-card {
      background: #FFFFFF;
      border: 1px solid rgba(184,134,11,0.18);
      border-radius: 16px;
      padding: 28px 32px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .landing-biz-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      margin-bottom: 20px;
      width: 100%;
    }
    .landing-biz-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      font-weight: 600;
    }
    .landing-biz-input {
      width: 100%;
      background: #FAFAF7;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--white);
      font-size: 15px;
      font-family: 'Inter', inherit;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .landing-biz-input::placeholder { color: #B0ADA4; }
    .landing-biz-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
      background: #FFFFFF;
    }

    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: #FFFFFF;
      border: none;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(184,134,11,0.35);
      font-family: 'Inter', inherit;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(184,134,11,0.5);
      background: var(--gold-muted);
    }

    .landing-footnote {
      margin-top: 12px;
      font-size: 12px;
      color: var(--gray);
      text-align: center;
    }

    /* ==================== PROGRESS BAR ==================== */
    .progress-wrap {
      background: #FFFFFF;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }
    .progress-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 760px;
      margin: 0 auto 10px;
      font-size: 12px;
      color: var(--gray);
    }
    .progress-head strong { color: var(--gold); font-size: 13px; font-weight: 700; }
    .progress-steps {
      display: flex;
      gap: 4px;
      max-width: 760px;
      margin: 0 auto;
    }
    .ps {
      flex: 1;
      height: 4px;
      background: #EDE9DE;
      border-radius: 2px;
      transition: background 0.3s ease;
    }
    .ps.done { background: rgba(184,134,11,0.45); }
    .ps.active { background: var(--gold); }

    /* ==================== SECTION PAGE ==================== */
    .section-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #FAFAF7;
    }

    .section-body {
      flex: 1;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 44px 24px 60px;
      animation: fadeUp 0.3s ease both;
    }

    .section-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 900;
      letter-spacing: -0.3px;
      line-height: 1.15;
      color: #1C1C1E;
      margin-bottom: 10px;
    }

    .section-desc {
      font-size: 15px;
      color: var(--gray-light);
      line-height: 1.7;
      margin-bottom: 32px;
      max-width: 540px;
    }

    .questions { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }

    .question {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }

    .q-text {
      font-size: 15px;
      font-weight: 600;
      color: #1C1C1E;
      line-height: 1.55;
    }
    .q-num {
      font-size: 10px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    /* YES/NO toggle buttons */
    .yn-group {
      display: flex;
      gap: 10px;
    }
    .yn-btn {
      flex: 1;
      padding: 13px 20px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: #FAFAF7;
      color: var(--gray);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
      letter-spacing: 0.5px;
      font-family: 'Inter', inherit;
    }
    .yn-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .yn-btn.selected-yes {
      background: rgba(21,128,61,0.08);
      border-color: rgba(21,128,61,0.35);
      color: #15803D;
    }
    .yn-btn.selected-no {
      background: rgba(185,28,28,0.07);
      border-color: rgba(185,28,28,0.3);
      color: #B91C1C;
    }

    /* Select dropdown */
    .q-select-wrap {
      background: #FAFAF7;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .q-select-wrap:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
    }
    .q-select {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #1C1C1E;
      font-size: 15px;
      font-weight: 500;
      padding: 13px 40px 13px 16px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      font-family: 'Inter', inherit;
    }
    .q-select option { background: #FFFFFF; color: #1C1C1E; }
    .q-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      pointer-events: none;
      font-size: 14px;
    }

    /* Textarea */
    .q-textarea {
      width: 100%;
      background: #FAFAF7;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: #1C1C1E;
      font-size: 15px;
      font-family: 'Inter', inherit;
      padding: 13px 16px;
      outline: none;
      resize: vertical;
      min-height: 100px;
      line-height: 1.65;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .q-textarea::placeholder { color: #B0ADA4; }
    .q-textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.1);
      background: #FFFFFF;
    }

    /* Nav */
    .section-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 8px;
    }

    .btn-back {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--gray);
      padding: 13px 28px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', inherit;
    }
    .btn-back:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

    .btn-next {
      background: var(--gold);
      border: none;
      color: #FFFFFF;
      padding: 14px 40px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(184,134,11,0.35);
      letter-spacing: 0.2px;
      font-family: 'Inter', inherit;
    }
    .btn-next:hover {
      background: var(--gold-muted);
      box-shadow: 0 6px 28px rgba(184,134,11,0.5);
      transform: translateY(-1px);
    }

    /* ==================== RESULTS (legacy selectors — overridden by .results-page scoped CSS below) ==================== */

    @media (max-width: 600px) {
      .yn-group { flex-direction: column; }
      .landing-illustration { max-width: 320px; }
      .landing-form-card { padding: 22px 20px 24px; }
    }

    /* ================================================================
       RESULTS PAGE — PREMIUM LIGHT CREAM & GOLD THEME
       ================================================================ */

    .results-page {
      min-height: 100vh;
      background: #FAFAF7;
      padding: 0 0 80px;
      animation: fadeUp 0.4s ease both;
      color: #1C1C1E;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .results-page .results-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ---- Header ---- */
    .results-page .results-header {
      text-align: center;
      padding: 56px 24px 0;
      margin-bottom: 0;
      border-bottom: none;
      background: transparent;
    }

    .results-page .res-header-logo {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }

    .results-page .res-tms {
      font-size: 22px;
      font-weight: 900;
      color: #B8860B;
      letter-spacing: 8px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .results-page .res-sub {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #9CA3AF;
      margin-bottom: 0;
    }

    .results-page .res-header-divider {
      width: 64px;
      height: 2px;
      background: linear-gradient(to right, rgba(184,134,11,0.3), #B8860B, rgba(184,134,11,0.3));
      margin: 0 auto 24px;
      border-radius: 2px;
    }

    .results-page .res-title {
      font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
      font-size: clamp(26px, 4.5vw, 40px);
      font-weight: 900;
      letter-spacing: -0.3px;
      color: #1C1C1E;
      margin-bottom: 8px;
      line-height: 1.15;
    }

    .results-page .res-biz {
      font-size: 16px;
      color: #B8860B;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .results-page .res-date {
      font-size: 12px;
      color: #9CA3AF;
      letter-spacing: 0.5px;
      margin-bottom: 44px;
    }

    /* ---- Overall Score Ring ---- */
    .results-page .overall-score-wrap {
      text-align: center;
      padding: 48px 24px 52px;
      background: #FFFFFF;
      border-radius: 20px;
      border: 1px solid rgba(184,134,11,0.15);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }

    .results-page .score-ring-container {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
    }

    .results-page .score-ring {
      width: 192px;
      height: 192px;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 28px rgba(0,0,0,0.10);
    }

    .results-page .score-ring::after {
      content: '';
      position: absolute;
      inset: 20px;
      background: #fff;
      border-radius: 50%;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
    }

    .results-page .score-ring-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      line-height: 1;
    }

    .results-page .score-pct {
      font-size: 54px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
      display: block;
    }

    .results-page .score-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      display: block;
    }

    .results-page .score-pct.green,
    .results-page .score-label.green  { color: #15803D; }
    .results-page .score-pct.yellow,
    .results-page .score-label.yellow { color: #B45309; }
    .results-page .score-pct.red,
    .results-page .score-label.red    { color: #B91C1C; }

    .results-page .score-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 18px;
      border-radius: 30px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .results-page .score-status-badge.green  { background: #F0FDF4; color: #15803D; border: 1.5px solid #86EFAC; }
    .results-page .score-status-badge.yellow { background: #FFFBEB; color: #B45309; border: 1.5px solid #FCD34D; }
    .results-page .score-status-badge.red    { background: #FEF2F2; color: #B91C1C; border: 1.5px solid #FCA5A5; }

    .results-page .score-verdict {
      font-size: 15px;
      color: #4B5563;
      max-width: 540px;
      margin: 0 auto;
      line-height: 1.75;
    }

    /* ---- Section Divider ---- */
    .results-page .section-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(184,134,11,0.25), transparent);
      margin: 44px 0 32px;
    }

    /* ---- Section Grid Label ---- */
    .results-page .sections-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #B8860B;
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* ---- Section Cards ---- */
    .results-page .sections-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 44px;
    }

    .results-page .sec-card {
      background: #FFFFFF;
      border-radius: 16px;
      border: 1px solid rgba(184,134,11,0.15);
      box-shadow: 0 2px 14px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
      overflow: hidden;
    }

    .results-page .sec-card-hdr {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid #F3F0E8;
      background: #FFFDF5;
    }

    .results-page .sec-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #FEF9E7 0%, #FDE68A 100%);
      border: 1px solid rgba(184,134,11,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .results-page .sec-num {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #9CA3AF;
      margin-bottom: 2px;
    }

    .results-page .sec-name {
      font-size: 15px;
      font-weight: 800;
      color: #1C1C1E;
    }

    .results-page .sec-score-pct {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .results-page .sec-score-badge {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: 3px;
      text-align: right;
    }

    .results-page .green-text  { color: #15803D; }
    .results-page .yellow-text { color: #B45309; }
    .results-page .red-text    { color: #B91C1C; }

    .results-page .sec-card-body { padding: 4px 0; }

    .results-page .sec-q-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 11px 24px;
      border-bottom: 1px solid #F7F5F0;
      gap: 16px;
    }
    .results-page .sec-q-row:last-child { border-bottom: none; }

    .results-page .sec-q-text {
      font-size: 13px;
      color: #4B5563;
      line-height: 1.5;
      flex: 1;
    }

    .results-page .sec-q-ans {
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .results-page .ans-yes  { background: #F0FDF4; color: #15803D; border: 1px solid #86EFAC; }
    .results-page .ans-no   { background: #FEF2F2; color: #B91C1C; border: 1px solid #FCA5A5; }

let state = {
  view: 'landing',       // 'landing' | 'quiz' | 'results'
  businessName: '',
  currentSection: 0,     // 0-based index into SECTIONS
  answers: {}            // { q1: 'yes'|'no'|value, ... }
};

// =====================================================================
// SCORING
// =====================================================================
function scoreSection(sectionIdx) {
  const sec = SECTIONS[sectionIdx];
  let earned = 0;
  let maxPossible = 0;

  sec.questions.forEach(q => {
    if (!q.scoring && q.type !== 'select') return; // textarea skipped
    if (q.type === 'yn') {
      maxPossible += 1;
      const ans = state.answers[q.id];
      if (ans === 'yes') earned += q.scoring.yes;
      else if (ans === 'no') earned += q.scoring.no;
    } else if (q.type === 'select') {
      maxPossible += 1;
      const ans = state.answers[q.id];
      const opt = q.options.find(o => o.value === ans);
      if (opt) earned += opt.score;
    }
  });

  if (maxPossible === 0) return { pct: 100, color: 'green', earned: 0, max: 0 };
  const pct = Math.round((earned / maxPossible) * 100);
  const color = pct >= 75 ? 'green' : pct >= 50 ? 'yellow' : 'red';
  return { pct, color, earned, max: maxPossible };
}

function scoreAll() {
  let totalEarned = 0;
  let totalMax = 0;
  const sections = SECTIONS.map((_, i) => {
    const s = scoreSection(i);
    totalEarned += s.earned;
    totalMax += s.max;
    return s;
  });
  const pct = totalMax > 0 ? Math.round((totalEarned / totalMax) * 100) : 0;
  const color = pct >= 75 ? 'green' : pct >= 50 ? 'yellow' : 'red';
  return { pct, color, sections };
}

function verdictText(color, pct) {
  if (color === 'green') return `Your cash flow health is strong at ${pct}%. You have solid fundamentals in place. The recommendations below will help you lock in your gains and identify any remaining gaps.`;

  return `Your cash flow health needs immediate attention at ${pct}%. Several key systems are missing or underperforming. The good news: the fixes are known, and many can be implemented quickly without major cost.`;
}

  if (q.type === 'select') {
    const optHtml = q.options.map(o =>
      `<option value="${o.value}" ${ans === o.value ? 'selected' : ''}>${escHtml(o.label)}</option>`
    ).join('');
    return `
      <div class="question" data-qid="${q.id}">
        <div class="q-num">Q${absNum}</div>
        <div class="q-text">${escHtml(q.text)}</div>
        <div class="q-select-wrap">
          <select class="q-select" data-qid="${q.id}">
            <option value="" disabled ${!ans ? 'selected' : ''}>Select an answer…</option>
            ${optHtml}
          </select>
        </div>
      </div>
    `;
  }

  if (q.type === 'textarea') {
    return `
      <div class="question" data-qid="${q.id}">
        <div class="q-num">Q${absNum}</div>
        <div class="q-text">${escHtml(q.text)}</div>
        <textarea
          class="q-textarea"
          data-qid="${q.id}"
          placeholder="${escHtml(q.placeholder || '')}"
          rows="4"
        >${escHtml(ans || '')}</textarea>
      </div>
    `;
  }

  return '';
}

// ---- RESULTS ----
function renderResults() {
  const { pct, color, sections } = scoreAll();
  const bizName = state.businessName || 'Your Business';
  const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  // Score ring: conic-gradient with computed degrees
  const ringColorMap = { green: '#15803D', yellow: '#B45309', red: '#B91C1C' };
  const ringColor = ringColorMap[color];
  const ringDeg = Math.round(pct * 3.6);
  const ringStyle = `background: conic-gradient(${ringColor} ${ringDeg}deg, #E8E5DC ${ringDeg}deg);`;
  const statusLabel = color === 'green' ? '✦ Healthy' : color === 'yellow' ? '◆ Needs Attention' : '▲ At Risk';

  const sectionCardsHtml = SECTIONS.map((sec, i) => {
    const s = sections[i];
    const cls = s.color + '-text';
    const label = s.color === 'green' ? 'Healthy' : s.color === 'yellow' ? 'Attention' : 'At Risk';

    const qRowsHtml = sec.questions.map(q => {
      const ans = state.answers[q.id];
      let ansBadge = '';
      if (q.type === 'yn') {
        ansBadge = ans === 'yes'
          ? `<span class="sec-q-ans ans-yes">Yes</span>`
          : ans === 'no'
          ? `<span class="sec-q-ans ans-no">No</span>`
          : `<span class="sec-q-ans ans-mid">–</span>`;
      } else if (q.type === 'select') {
        const opt = q.options.find(o => o.value === ans);
        const sc = opt ? opt.score : -1;
        const cls2 = sc >= 0.75 ? 'ans-yes' : sc >= 0.5 ? 'ans-mid' : 'ans-no';
        ansBadge = opt
          ? `<span class="sec-q-ans ${cls2}">${escHtml(opt.label)}</span>`
          : `<span class="sec-q-ans ans-mid">–</span>`;
      } else if (q.type === 'textarea') {
        const txt = ans ? ans.slice(0, 60) + (ans.length > 60 ? '…' : '') : '(not answered)';
        ansBadge = `<span class="sec-q-ans ans-text">${escHtml(txt)}</span>`;
      }
      return `
        <div class="sec-q-row">
          <span class="sec-q-text">${escHtml(q.text)}</span>
          ${ansBadge}
        </div>
      `;
    }).join('');

    return `
      <div class="sec-card">
        <div class="sec-card-hdr">
          <div class="sec-icon-wrap">${sec.icon}</div>
          <div class="sec-info">
            <div class="sec-num">Section ${sec.id}</div>
            <div class="sec-name">${escHtml(sec.title)}</div>
          </div>
          <div class="sec-score-wrap">
            <div class="sec-score-pct ${cls}">${s.pct}%</div>
            <div class="sec-score-badge ${cls}">${label}</div>
          </div>
        </div>
        <div class="sec-card-body">${qRowsHtml}</div>
      </div>
    `;
  }).join('');

  const recsHtml = SECTIONS.map((sec, i) => {
    const s = sections[i];
    const rec = RECS[sec.id][s.color];
    return `
      <div class="rec-card ${s.color}">
        <div class="rec-section-name ${s.color + '-text'}">${sec.icon} Section ${sec.id} — ${sec.title}</div>
        <div class="rec-text">${escHtml(rec)}</div>
      </div>
    `;
  }).join('');

  const concern = state.answers['q20'];

  return `
    <div class="results-page">
      <div class="results-container">

        <div class="results-header">
          <div class="res-header-logo">
            <span class="res-tms">TMS</span>
            <span class="res-sub">Solutions Group</span>
          </div>
          <div class="res-header-divider"></div>
          <h1 class="res-title">Cash Flow Health Check</h1>
          ${bizName !== 'Your Business' ? `<div class="res-biz">${escHtml(bizName)}</div>` : ''}
          <div class="res-date">${today}</div>
        </div>

        <div class="overall-score-wrap">
          <div class="score-ring-container">
            <div class="score-ring" style="${ringStyle}">
              <div class="score-ring-inner">
                <span class="score-pct ${color}">${pct}%</span>
                <span class="score-label ${color}">${color.toUpperCase()}</span>
              </div>
            </div>
            <span class="score-status-badge ${color}">${statusLabel}</span>
          </div>
          <p class="score-verdict">${verdictText(color, pct)}</p>
        </div>

        <div class="section-divider"></div>

        <div class="sections-label">Section Scores</div>
        <div class="sections-grid">${sectionCardsHtml}</div>

        ${concern ? `
        <div style="margin-bottom:40px;">
          <div class="concern-section-title">Your Biggest Concern</div>
          <div class="concern-box">"${escHtml(concern)}"</div>
        </div>
        ` : ''}

        <div class="recs-section">
          <h2 class="recs-title">Your <span>Action Plan</span></h2>
          ${recsHtml}
        </div>

        <div class="contact-cta">
          <h3>Ready to fix this — fast?</h3>
          <p>TMS Solutions Group works with small business owners to implement the systems that improve cash flow without adding to your workload. Schedule a free call to talk through your results.</p>
          <p><a href="mailto:contact@tmssolutionsgroup.com">contact@tmssolutionsgroup.com</a></p>
        </div>

        <div class="results-actions">
          <button class="btn-download" id="pdf-btn">⬇ Download PDF Report</button>
          <button class="btn-restart" id="restart-btn">Start Over</button>
        </div>

      </div>
    </div>
  `;
}

// =====================================================================
// EVENT LISTENERS
// =====================================================================
function attachListeners() {
  // Landing
  const startBtn = document.getElementById('start-btn');
  if (startBtn) {
    startBtn.addEventListener('click', () => {
      const input = document.getElementById('biz-name-input');
      state.businessName = input ? input.value.trim() : '';
      state.view = 'quiz';
      state.currentSection = 0;
      render();
      window.scrollTo(0, 0);
    });
  }

  // Business name on Enter
  const bizInput = document.getElementById('biz-name-input');
  if (bizInput) {
    bizInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('start-btn')?.click();
    });
  }

  // YES/NO buttons
  document.querySelectorAll('.yn-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const qid = btn.dataset.qid;
      const val = btn.dataset.val;
      state.answers[qid] = val;
      // Update classes without full re-render
      const group = btn.closest('.yn-group');
      group.querySelectorAll('.yn-btn').forEach(b => {
        b.classList.remove('selected-yes', 'selected-no');
      });
      btn.classList.add(val === 'yes' ? 'selected-yes' : 'selected-no');
    });
  });

  // Select dropdowns
  document.querySelectorAll('.q-select').forEach(sel => {
    sel.addEventListener('change', () => {
      state.answers[sel.dataset.qid] = sel.value;
    });
  });

  // Textareas
  document.querySelectorAll('.q-textarea').forEach(ta => {
    ta.addEventListener('input', () => {
      state.answers[ta.dataset.qid] = ta.value;
    });
  });

  // Back button
  const backBtn = document.getElementById('back-btn');
  if (backBtn) {
    backBtn.addEventListener('click', () => {
      if (state.currentSection > 0) {
        state.currentSection--;
        render();
        window.scrollTo(0, 0);
      }
    });
  }

  // Next button
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      if (state.currentSection < SECTIONS.length - 1) {
        state.currentSection++;
        render();
        window.scrollTo(0, 0);
      } else {
        state.view = 'results';
        render();
        window.scrollTo(0, 0);
      }
    });
  }

  // PDF download
  const pdfBtn = document.getElementById('pdf-btn');
  if (pdfBtn) {
    pdfBtn.addEventListener('click', generatePDF);
  }

  // Restart
  const restartBtn = document.getElementById('restart-btn');
  if (restartBtn) {
    restartBtn.addEventListener('click', () => {
      state = { view: 'landing', businessName: state.businessName, currentSection: 0, answers: {} };
      render();
      window.scrollTo(0, 0);
    });
  }
}

// =====================================================================
// PDF GENERATION
// =====================================================================
function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const W = 612, H = 792;
  // Cream & gold palette — matches redesigned UI
  const CREAM      = [250, 250, 247];   // #FAFAF7
  const WHITE      = [255, 255, 255];
  const CHARCOAL   = [28,  28,  30 ];   // #1C1C1E
  const GOLD       = [184, 134, 11 ];   // #B8860B
  const GOLD_LIGHT = [254, 249, 236];   // #FEF9EC
  const BORDER     = [232, 229, 220];   // #E8E5DC
  const GRAY       = [107, 114, 128];   // #6B7280
  const GRAY_LIGHT = [75,  85,  99 ];   // #4B5563
  const GREEN_C    = [21,  128, 61 ];   // #15803D
  const YELLOW_C   = [180, 83,  9  ];   // #B45309
  const RED_C      = [185, 28,  28 ];   // #B91C1C

  const { pct, color, sections } = scoreAll();
  const bizName = state.businessName || 'Your Business';
  const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  function colorForStatus(c) {
    if (c === 'green') return GREEN_C;
    if (c === 'yellow') return YELLOW_C;
    return RED_C;
  }

  function labelForStatus(c) {
    if (c === 'green') return 'GREEN — Healthy';
    if (c === 'yellow') return 'YELLOW — Needs Attention';
    return 'RED — At Risk';
  }

  function newPage() {
    doc.addPage();
    doc.setFillColor(...WHITE);
    doc.rect(0, 0, W, H, 'F');
  }

  function setColor(rgb) { doc.setTextColor(...rgb); }
  function setFill(rgb)  { doc.setFillColor(...rgb); }
  function setDraw(rgb)  { doc.setDrawColor(...rgb); }

  function goldLine(x1, y1, x2) {
    setDraw(GOLD);
    doc.setLineWidth(1);
    doc.line(x1, y1, x2, y1);
  }

  function borderLine(x1, y1, x2) {
    setDraw(BORDER);
    doc.setLineWidth(0.5);
    doc.line(x1, y1, x2, y1);
  }

  function footer(pageNum, total) {
    // thin top border above footer
    setDraw(BORDER);
    doc.setLineWidth(0.5);
    doc.line(40, H - 40, W - 40, H - 40);
    setColor(GRAY);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'normal');
    doc.setCharSpace(0.5);
    doc.text('TMS SOLUTIONS GROUP  ·  CASH FLOW HEALTH CHECK  ·  CONFIDENTIAL', W / 2, H - 26, { align: 'center' });
    doc.setCharSpace(0);
    doc.text(`${pageNum} / ${total}`, W - 40, H - 26, { align: 'right' });
  }

  const TOTAL_PAGES = 7;

  // ===== PAGE 1: COVER =====
  // White page
  doc.setFillColor(...WHITE);
  doc.rect(0, 0, W, H, 'F');

  // Cream header band
  doc.setFillColor(...CREAM);
  doc.rect(0, 0, W, 320, 'F');

  // Gold top accent bar
  setFill(GOLD);
  doc.rect(0, 0, W, 4, 'F');

  // TMS logo
  setColor(GOLD);
  doc.setFontSize(36);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(10);
  doc.text('TMS', W / 2, 120, { align: 'center' });
  doc.setCharSpace(0);

  setColor(GRAY);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.setCharSpace(4);
  doc.text('SOLUTIONS GROUP', W / 2, 138, { align: 'center' });
  doc.setCharSpace(0);

  // Gold rule
  setFill(GOLD);
  doc.rect(W / 2 - 28, 150, 56, 1.5, 'F');

  // Title
  setColor(CHARCOAL);
  doc.setFontSize(32);
  doc.setFont('helvetica', 'bold');
  doc.text('Cash Flow', W / 2, 198, { align: 'center' });
  doc.text('Health Check', W / 2, 236, { align: 'center' });

  setColor(GOLD);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.setCharSpace(2.5);
  doc.text('BUSINESS FINANCIAL ASSESSMENT', W / 2, 262, { align: 'center' });
  doc.setCharSpace(0);

  // Separator line
  borderLine(56, 296, W - 56);

  // Business name + date
  if (bizName !== 'Your Business') {
    setColor(GOLD);
    doc.setFontSize(16);
    doc.setFont('helvetica', 'bold');
    doc.text(bizName, W / 2, 340, { align: 'center' });
  }
  setColor(GRAY);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'normal');
  doc.text(today, W / 2, bizName !== 'Your Business' ? 362 : 340, { align: 'center' });

  // Score card
  const scoreColor = colorForStatus(color);
  const scoreCardY = 420;

  // Card border
  setDraw(scoreColor);
  doc.setLineWidth(1.5);
  doc.rect(W / 2 - 110, scoreCardY, 220, 130);

  // Tinted fill — very light
  doc.setFillColor(
    255 - (255 - scoreColor[0]) * 0.06,
    255 - (255 - scoreColor[1]) * 0.06,
    255 - (255 - scoreColor[2]) * 0.06
  );
  doc.rect(W / 2 - 110, scoreCardY, 220, 130, 'F');
  // re-draw border on top of fill
  setDraw(scoreColor);
  doc.setLineWidth(1.5);
  doc.rect(W / 2 - 110, scoreCardY, 220, 130);

  setColor(scoreColor);
  doc.setFontSize(52);
  doc.setFont('helvetica', 'bold');
  doc.text(`${pct}%`, W / 2, scoreCardY + 66, { align: 'center' });

  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(1.5);
  doc.text(labelForStatus(color).toUpperCase(), W / 2, scoreCardY + 90, { align: 'center' });
  doc.setCharSpace(0);

  // Verdict excerpt
  setColor(GRAY_LIGHT);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  const vShort = doc.splitTextToSize(verdictText(color, pct), 420);
  doc.text(vShort.slice(0, 2), W / 2, scoreCardY + 112, { align: 'center' });

  // Gold bottom bar
  setFill(GOLD);
  doc.rect(0, H - 4, W, 4, 'F');

  footer(1, TOTAL_PAGES);

  // ===== PAGE 2: EXECUTIVE SUMMARY =====
  newPage();
  setFill(GOLD);
  doc.rect(0, 0, W, 4, 'F');

  // Page eyebrow
  setColor(GOLD);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(2.5);
  doc.text('EXECUTIVE SUMMARY', 56, 38);
  doc.setCharSpace(0);
  goldLine(56, 46, W - 56);

  setColor(CHARCOAL);
  doc.setFontSize(20);
  doc.setFont('helvetica', 'bold');
  doc.text('Overall Cash Flow Health', 56, 78);

  // Score banner
  const sc = colorForStatus(color);
  // Tinted fill
  doc.setFillColor(
    255 - (255 - sc[0]) * 0.07,
    255 - (255 - sc[1]) * 0.07,
    255 - (255 - sc[2]) * 0.07
  );
  doc.rect(56, 90, 500, 84, 'F');
  setDraw(sc);
  doc.setLineWidth(1);
  doc.rect(56, 90, 500, 84);
  // colored left accent bar
  doc.setFillColor(...sc);
  doc.rect(56, 90, 4, 84, 'F');

  setColor(sc);
  doc.setFontSize(42);
  doc.setFont('helvetica', 'bold');
  doc.text(`${pct}%`, 112, 146);

  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text(labelForStatus(color), 210, 126);

  setColor(GRAY_LIGHT);
  doc.setFontSize(9.5);
  doc.setFont('helvetica', 'normal');
  const verdictLines = doc.splitTextToSize(verdictText(color, pct), 290);
  doc.text(verdictLines, 210, 144);

  // Section scores table
  setColor(CHARCOAL);
  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text('Section-by-Section Scores', 56, 210);
  borderLine(56, 218, W - 56);

  let ty = 238;
  SECTIONS.forEach((sec, i) => {
    const s = sections[i];
    const sc2 = colorForStatus(s.color);

    // Alternating row tint
    if (i % 2 === 0) {
      doc.setFillColor(...CREAM);
      doc.rect(56, ty - 13, 500, 26, 'F');
    }
    // Colored left bar
    doc.setFillColor(...sc2);
    doc.rect(56, ty - 13, 3, 26, 'F');

    setColor(CHARCOAL);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text(`${sec.title}`, 70, ty + 3);

    // Progress bar track
    const barX = 268, barW = 176, barH = 7;
    doc.setFillColor(...BORDER);
    doc.rect(barX, ty - 2, barW, barH, 'F');
    doc.setFillColor(...sc2);
    doc.rect(barX, ty - 2, barW * (s.pct / 100), barH, 'F');

    setColor(sc2);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text(`${s.pct}%`, 462, ty + 3);

    doc.setFontSize(8);
    doc.setCharSpace(1);
    doc.text(s.color.toUpperCase(), 510, ty + 3);
    doc.setCharSpace(0);

    ty += 28;
  });

  // Concern box
  const concern = state.answers['q20'];
  if (concern) {
    ty += 12;
    setColor(GOLD);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setCharSpace(1.5);
    doc.text('YOUR BIGGEST CONCERN', 56, ty);
    doc.setCharSpace(0);
    ty += 12;
    doc.setFillColor(...CREAM);
    doc.setDrawColor(...GOLD);
    doc.setLineWidth(0.5);
    doc.rect(56, ty - 10, 500, 44, 'F');
    doc.setFillColor(...GOLD);
    doc.rect(56, ty - 10, 3, 44, 'F');
    setColor(GRAY_LIGHT);
    doc.setFontSize(9.5);
    doc.setFont('helvetica', 'italic');
    const cLines = doc.splitTextToSize(`"${concern}"`, 470);
    doc.text(cLines.slice(0, 3), 68, ty + 6);
  }

  setFill(GOLD);
  doc.rect(0, H - 4, W, 4, 'F');
  footer(2, TOTAL_PAGES);

  // ===== PAGES 3-6: SECTIONS 1-4 =====
  for (let i = 0; i < 4; i++) {
    newPage();
    setFill(GOLD);
    doc.rect(0, 0, W, 4, 'F');
    renderSectionPage(doc, SECTIONS[i], sections[i], i + 3, TOTAL_PAGES,
      { W, H, GOLD, WHITE, CREAM, CHARCOAL, BORDER, GRAY, GRAY_LIGHT,
        colorForStatus, labelForStatus, footer, goldLine, borderLine, setColor, setFill, setDraw });
  }

  // ===== PAGE 7: SECTIONS 5 & 6 + RECOMMENDATIONS + DISCLAIMER =====
  newPage();
  setFill(GOLD);
  doc.rect(0, 0, W, 4, 'F');

  let py = 38;

  // Sections 5 & 6 compact
  for (let i = 4; i < 6; i++) {
    const sec = SECTIONS[i];
    const s = sections[i];
    const sc3 = colorForStatus(s.color);

    setColor(GOLD);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.setCharSpace(2);
    doc.text(`SECTION ${sec.id} — ${sec.title.toUpperCase()}`, 56, py);
    doc.setCharSpace(0);
    goldLine(56, py + 7, W - 56);
    py += 22;

    setColor(sc3);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text(`${s.pct}%`, 56, py);
    setColor(GRAY_LIGHT);
    doc.setFontSize(11);
    doc.text(`  ${labelForStatus(s.color)}`, 96, py);
    py += 16;

    sec.questions.forEach(q => {
      const ans = state.answers[q.id];
      if (q.type === 'textarea') return;
      let ansText = '–';
      let ansColor = GRAY;
      if (q.type === 'yn') {
        ansText = ans === 'yes' ? 'YES' : ans === 'no' ? 'NO' : '–';
        ansColor = ans === 'yes' ? GREEN_C : ans === 'no' ? RED_C : GRAY;
      } else if (q.type === 'select') {
        const opt = q.options.find(o => o.value === ans);
        ansText = opt ? opt.label : '–';
        ansColor = opt ? (opt.score >= 0.75 ? GREEN_C : opt.score >= 0.5 ? YELLOW_C : RED_C) : GRAY;
      }
      // Set font BEFORE splitTextToSize so wrapping uses the correct metrics
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      const qLines = doc.splitTextToSize(q.text, 390);
      const lineH = 9 * 1.15;                          // ≈ 10.35 pt per line
      const textBlockH = qLines.length * lineH;
      const rowH = Math.max(24, textBlockH + 18);       // top padding 10 + bottom padding 8

      setColor(CHARCOAL);
      doc.text(qLines, 56, py + 11);
      setColor(ansColor);
      doc.setFont('helvetica', 'bold');
      doc.text(ansText, 546, py + 11, { align: 'right' });
      borderLine(56, py + rowH - 3, W - 56);
      py += rowH;
    });
    py += 12;
  }

  // Recommendations
  py += 4;
  goldLine(56, py, W - 56);
  py += 18;
  setColor(CHARCOAL);
  doc.setFontSize(13);
  doc.setFont('helvetica', 'bold');
  doc.text('Action Plan & Recommendations', 56, py);
  py += 16;

  SECTIONS.forEach((sec, i) => {
    const s = sections[i];
    const sc4 = colorForStatus(s.color);
    const rec = RECS[sec.id][s.color];
    const rLines = doc.splitTextToSize(rec, 450);
    const boxH = Math.min(rLines.length, 3) * 12 + 28;

    // Card background
    doc.setFillColor(...CREAM);
    doc.rect(56, py, 500, boxH, 'F');
    // Colored left bar
    doc.setFillColor(...sc4);
    doc.rect(56, py, 3, boxH, 'F');

    setColor(sc4);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text(sec.title, 68, py + 14);

    setColor(GRAY_LIGHT);
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    doc.text(rLines.slice(0, 3), 68, py + 26);
    py += boxH + 6;

    if (py > H - 130) {
      setFill(GOLD);
      doc.rect(0, H - 4, W, 4, 'F');
      footer(7, TOTAL_PAGES);
      newPage();
      setFill(GOLD);
      doc.rect(0, 0, W, 4, 'F');
      py = 38;
    }
  });

  // Disclaimer
  py += 10;
  borderLine(56, py, W - 56);
  py += 14;
  setColor(GRAY);
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'italic');
  const disc = 'DISCLAIMER: This assessment is provided for general informational and educational purposes only. It does not constitute financial, legal, accounting, or professional advice. Results are based solely on your self-reported responses and should not be relied upon as a substitute for consultation with qualified financial, legal, or business professionals. TMS Solutions Group makes no warranties, express or implied, regarding the accuracy, completeness, or suitability of this assessment for any particular purpose. Individual business results will vary. All financial decisions should be made in consultation with appropriate licensed professionals.';
  const dLines = doc.splitTextToSize(disc, 500);
  doc.text(dLines, 56, py);

  setFill(GOLD);
  doc.rect(0, H - 4, W, 4, 'F');
  footer(7, TOTAL_PAGES);

  // Save
  const safeName = (state.businessName || 'TMS').replace(/[^a-zA-Z0-9]/g, '_');
  doc.save(`TMS_CashFlow_HealthCheck_${safeName}.pdf`);
}

// Helper to render a full section page (pages 3-6)
function renderSectionPage(doc, sec, s, pageNum, total, helpers) {
  const { W, H, GOLD, WHITE, CREAM, CHARCOAL, BORDER, GRAY, GRAY_LIGHT,
          colorForStatus, labelForStatus, footer, goldLine, borderLine, setColor, setFill, setDraw } = helpers;
  const GREEN_C  = [21,  128, 61];
  const YELLOW_C = [180, 83,  9];
  const RED_C    = [185, 28,  28];
  const sc = colorForStatus(s.color);

  // Eyebrow + rule
  setColor(GOLD);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(2.5);
  doc.text(`SECTION ${sec.id}  —  ${sec.title.toUpperCase()}`, 56, 38);
  doc.setCharSpace(0);
  goldLine(56, 46, W - 56);

  // Title left, score right
  setColor(CHARCOAL);
  doc.setFontSize(24);
  doc.setFont('helvetica', 'bold');
  doc.text(sec.title, 56, 80);

  setColor(sc);
  doc.setFontSize(32);
  doc.text(`${s.pct}%`, W - 56, 76, { align: 'right' });
  doc.setFontSize(10);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(1.5);
  doc.text(labelForStatus(s.color).toUpperCase(), W - 56, 94, { align: 'right' });
  doc.setCharSpace(0);

  setColor(GRAY_LIGHT);
  doc.setFontSize(9.5);
  doc.setFont('helvetica', 'normal');
  const descLines = doc.splitTextToSize(sec.desc, 460);
  doc.text(descLines, 56, 110);

  borderLine(56, 132, W - 56);

  let qy = 152;
  sec.questions.forEach((q, qi) => {
    const ans = state.answers[q.id];
    const absNum = SECTIONS.slice(0, sec.id - 1).reduce((a, s2) => a + s2.questions.length, 0) + qi + 1;

    // Q number badge
    setColor(GOLD);
    doc.setFontSize(7.5);
    doc.setFont('helvetica', 'bold');
    doc.text(`Q${absNum}`, 56, qy);

    // Question text
    setColor(CHARCOAL);
    doc.setFontSize(10.5);
    doc.setFont('helvetica', 'bold');
    const qLines = doc.splitTextToSize(q.text, 390);
    doc.text(qLines, 74, qy);

    const qH = qLines.length * 14;

    if (q.type === 'yn') {
      const ansText = ans === 'yes' ? 'YES' : ans === 'no' ? 'NO' : '—';
      const ansColor = ans === 'yes' ? GREEN_C : ans === 'no' ? RED_C : GRAY;
      setColor(ansColor);
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.text(ansText, W - 56, qy, { align: 'right' });
    } else if (q.type === 'select') {
      const opt = q.options.find(o => o.value === ans);
      const optColor = opt ? (opt.score >= 0.75 ? GREEN_C : opt.score >= 0.5 ? YELLOW_C : RED_C) : GRAY;
      setColor(optColor);
      doc.setFontSize(9.5);
      doc.setFont('helvetica', 'bold');
      doc.text(opt ? opt.label : 'Not answered', W - 56, qy, { align: 'right' });
    } else if (q.type === 'textarea') {
      const txt = ans || '(not answered)';
      // Cream box for text answer
      doc.setFillColor(...CREAM);
      doc.rect(74, qy + 4, 460, 32, 'F');
      setColor(GRAY_LIGHT);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'italic');
      const tLines = doc.splitTextToSize(`"${txt}"`, 448);
      doc.text(tLines.slice(0, 2), 80, qy + 16);
    }

    // Row separator
    doc.setDrawColor(...BORDER);
    doc.setLineWidth(0.5);
    doc.line(56, qy + qH + 10, W - 56, qy + qH + 10);

    qy += Math.max(qH + 22, 40);
  });

  // Recommendation box
  const rec = RECS[sec.id][s.color];
  const recY = Math.max(qy + 8, H - 185);
  const recLines = doc.splitTextToSize(rec, 448);
  const recBoxH = Math.min(recLines.length, 5) * 12 + 36;

  doc.setFillColor(...CREAM);
  doc.rect(56, recY, 500, recBoxH, 'F');
  // Colored left accent
  doc.setFillColor(...sc);
  doc.rect(56, recY, 4, recBoxH, 'F');

  setColor(sc);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.setCharSpace(1.5);
  doc.text('RECOMMENDATION', 70, recY + 16);
  doc.setCharSpace(0);

  setColor(GRAY_LIGHT);
  doc.setFontSize(9.5);
  doc.setFont('helvetica', 'normal');
  doc.text(recLines.slice(0, 5), 70, recY + 30);

  setFill(GOLD);
  doc.rect(0, H - 4, W, 4, 'F');
  footer(pageNum, total);
}

// =====================================================================
// UTILS
// =====================================================================
function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// =====================================================================
// INIT
// =====================================================================
render();
</script>
